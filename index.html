// ─── HELPERS ──────────────────────────────────────────────────────────────────
function getCombo(scores) {
  const strong    = Object.values(scores).filter(v => v === 3).length;
  const developing = Object.values(scores).filter(v => v >= 2).length;
  const avg = (Object.values(scores).reduce((a,b)=>a+b,0)/7).toFixed(1);
  if (strong >= 5)     return { label:"Kingdom Competitor", icon:"🏆", color:C.orange, progress:95,  avg };
  if (developing >= 6) return { label:"Strong Disciple",    icon:"🌟", color:C.green,  progress:85,  avg };
  return { label:"Developing Disciple", icon:"🌱", color:"#fd7e14", progress:Math.round(developing/7*100), avg };
}
 
function calcTeamStats(athletes) {
  if (!athletes.length) return { avgScore:"0.0", strongPercent:0, totalAthletes:0 };
  let totalScore=0, totalStrong=0;
  const totalV = athletes.length * 7;
  athletes.forEach(a => {
    const s = Object.values(a.scores||{});
    totalScore += s.reduce((a,b)=>a+b,0);
    totalStrong += s.filter(v=>v===3).length;
  });
  return { avgScore:(totalScore/totalV).toFixed(1), strongPercent:Math.round(totalStrong/totalV*100), totalAthletes:athletes.length };
}
 
function progressBg(pct) {
  return pct > 80 ? "linear-gradient(90deg,#00b36b,#34d399)" : pct > 50 ? "linear-gradient(90deg,#ff8c00,#ffaa00)" : "#dc3545";
}

function Modal({ title, onClose, children, wide }) {
  useEffect(() => {
    document.body.style.overflow = "hidden";
    return () => { document.body.style.overflow = ""; };
  }, []);
  return (
    <div className="modal-wrap" style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center"}}
         onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-inner" style={{background:"#fff",borderRadius:16,width:"94%",maxWidth:wide?760:560,maxHeight:"92vh",overflow:"hidden",boxShadow:"0 25px 70px rgba(0,0,0,0.3)",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"16px 20px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <span style={{fontSize:20,fontWeight:800,color:C.orange}}>{title}</span>
          <button onClick={onClose} style={{fontSize:24,background:"none",border:"none",color:"#666",lineHeight:1,padding:"0 4px"}}>✕</button>
        </div>
        <div style={{padding:20,overflowY:"auto",flex:1}}>{children}</div>
      </div>
    </div>
  );
}

  return (
    <Modal title={person.name} onClose={onClose} wide>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,gap:12}}>
        <div>
          <div style={{fontSize:42,lineHeight:1}}>{combo.icon}</div>
          <div style={{fontSize:20,fontWeight:800,color:combo.color,marginTop:4}}>{combo.label}</div>
          <div style={{fontSize:13,color:C.textMuted}}>Avg {combo.avg}/3</div>
        </div>
        <div style={{display:"flex",gap:8,flexShrink:0}}>
          <button onClick={()=>{ onEdit(person); onClose(); }}
            style={{background:C.orange,color:"#fff",border:"none",padding:"10px 18px",borderRadius:10,fontWeight:700,fontSize:14}}>✏ Edit</button>
          <button onClick={onDelete}
            style={{background:"#fee2e2",color:C.red,border:"none",padding:"10px 14px",borderRadius:10,fontWeight:700,fontSize:14}}>🗑</button>
        </div>
      </div>
 
      <div style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}>
          <span style={{color:C.textMuted}}>Character Progress</span>
          <span style={{fontWeight:700}}>{combo.progress}%</span>
        </div>
        <div className="progress-bar">
          <div className="progress-fill" style={{width:`${combo.progress}%`,background:progressBg(combo.progress)}} />
        </div>
        <div style={{fontSize:12,color:C.textMuted,marginTop:4}}>
          Last updated: {person.lastUpdated ? new Date(person.lastUpdated).toLocaleDateString() : "Never"}
        </div>
      </div>
 
      <div style={{display:"flex",borderBottom:`3px solid ${C.orange}`,marginBottom:16}}>
        {["assess","develop","notes"].map(t => (
          <button key={t} onClick={()=>setTab(t)}
            style={{flex:1,padding:"12px 4px",fontWeight:700,fontSize:13,background:tab===t?C.orange:"#f1f3f5",color:tab===t?"#fff":"#333",border:"none"}}>
            {t==="assess"?"📊 Profile":t==="develop"?"🛠 Develop":"📝 Notes"}
          </button>
        ))}
      </div>
 
      {tab==="assess" && Object.entries(person.scores).map(([k,v]) => {
        const t = VIRTUES[k];
        const good = v >= 2;
        return (
          <div key={k} style={{marginBottom:14,background:"#fff",border:`2px solid ${t.border}`,borderRadius:12,overflow:"hidden"}}>
            <div style={{background:t.bg,padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:32}}>{t.icon}</span>
              <div style={{flex:1,fontSize:17,fontWeight:800,color:t.color}}>{t.label}</div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:18,fontWeight:800}}>{v}/3</div>
                <div style={{fontSize:11,color:C.textMuted}}>{SCORE_LABELS[v]}</div>
              </div>
            </div>
            <div style={{padding:"12px 16px"}}>
              {(good ? t.strong : t.weak).map((s,i) => (
                <div key={i} style={{marginBottom:4,fontSize:14,color:C.textSub}}>{good?"→":"–"} {s}</div>
              ))}
            </div>
          </div>
        );
      })}
 
      {tab==="develop" && Object.entries(person.scores).map(([k,v]) => {
        const t = VIRTUES[k];
        return (
          <div key={k} style={{marginBottom:14,background:"#fff",border:`2px solid ${t.border}`,borderRadius:12,overflow:"hidden"}}>
            <div style={{background:t.bg,padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:28}}>{t.icon}</span>
              <div style={{fontSize:16,fontWeight:800,color:t.color,flex:1}}>{t.label}</div>
              <span style={{fontSize:12,color:C.textMuted,background:"#fff",padding:"3px 10px",borderRadius:20,fontWeight:700,border:`1px solid ${C.border}`}}>{SCORE_LABELS[v]}</span>
            </div>
            <div style={{padding:"12px 16px"}}>
              {t.develop.map((step,i) => (
                <div key={i} style={{display:"flex",gap:10,marginBottom:10,alignItems:"flex-start"}}>
                  <span style={{background:C.orange,color:"#fff",borderRadius:"50%",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,flexShrink:0}}>{i+1}</span>
                  <span style={{fontSize:14,color:C.text,lineHeight:1.5}}>{step}</span>
                </div>
              ))}
            </div>
          </div>
        );
      })}
 
      {tab==="notes" && (
        <div style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:12,padding:20,minHeight:180,whiteSpace:"pre-wrap",fontSize:14,color:person.notes?C.text:C.textMuted}}>
          {person.notes || "No notes added yet.\n\nUse this space to record key moments, conversations, prayer requests, or anything God puts on your heart about this athlete."}
        </div>
      )}
    </Modal>
  );
}
 
// ─── TEAM NAME EDIT MODAL ─────────────────────────────────────────────────────
function TeamNameModal({ team, onSave, onClose }) {
  const [name, setName] = useState(team ? team.name : "");
  return (
    <Modal title={team ? "Rename Team" : "New Team"} onClose={onClose}>
      <input autoFocus placeholder="Team name (e.g., '14U Blue Jays')" value={name}
        onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&name.trim()&&onSave(name.trim())}
        style={{width:"100%",padding:14,fontSize:17,border:`2px solid ${C.border}`,borderRadius:10,marginBottom:20}} />
      <div style={{display:"flex",gap:12,justifyContent:"flex-end"}}>
        <button onClick={onClose} style={{padding:"12px 24px",border:"none",background:"#ddd",borderRadius:10,fontWeight:700}}>Cancel</button>
        <button onClick={()=>name.trim()&&onSave(name.trim())} disabled={!name.trim()}
          style={{padding:"12px 28px",border:"none",background:name.trim()?C.orange:"#ccc",color:"#fff",borderRadius:10,fontWeight:700}}>
          {team ? "Rename" : "Create Team"}
        </button>
      </div>
    </Modal>
  );
}
 
// ─── TEAM SWITCHER ────────────────────────────────────────────────────────────
function TeamSwitcher({ teams, activeId, onSwitch, onNew, onRename, onDelete }) {
  const [open, setOpen] = useState(false);
  const active = teams.find(t=>t.id===activeId) || teams[0];
  return (
    <div style={{position:"relative"}}>
      <button onClick={()=>setOpen(o=>!o)}
        style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",borderRadius:10,border:`2px solid ${C.orange}`,background:"#fff",fontWeight:700,fontSize:14,maxWidth:200}}>
        <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{active?.name||"My Team"}</span>
        <span style={{flexShrink:0,color:C.orange}}>{open?"▲":"▼"}</span>
      </button>
      {open && (
        <div style={{position:"absolute",top:"calc(100% + 8px)",left:0,background:"#fff",border:`1px solid ${C.border}`,borderRadius:12,boxShadow:"0 8px 30px rgba(0,0,0,0.15)",zIndex:100,minWidth:220,overflow:"hidden"}}>
          {teams.map(t => (
            <div key={t.id} style={{display:"flex",alignItems:"center",background:t.id===activeId?"#fff8f0":"#fff",borderBottom:`1px solid ${C.border}`}}>
              <button onClick={()=>{onSwitch(t.id);setOpen(false);}}
                style={{flex:1,padding:"12px 16px",background:"none",border:"none",textAlign:"left",fontWeight:t.id===activeId?700:400,color:t.id===activeId?C.orange:C.text,fontSize:14}}>
                {t.id===activeId?"✓ ":""}{t.name}
              </button>
              <button onClick={()=>{onRename(t);setOpen(false);}}
                style={{padding:"12px 10px",background:"none",border:"none",color:C.textMuted,fontSize:16}} title="Rename">✏</button>
              {teams.length > 1 && (
                <button onClick={()=>{onDelete(t);setOpen(false);}}
                  style={{padding:"12px 10px",background:"none",border:"none",color:"#ffbbbb",fontSize:16}} title="Delete team">🗑</button>
              )}
            </div>
          ))}
          <button onClick={()=>{onNew();setOpen(false);}}
            style={{width:"100%",padding:"12px 16px",background:"#fff8f0",border:"none",textAlign:"left",fontWeight:700,color:C.orange,fontSize:14}}>
            ＋ New Team
          </button>
        </div>
      )}
      {open && <div style={{position:"fixed",inset:0,zIndex:99}} onClick={()=>setOpen(false)} />}
    </div>
  );
}
 
// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [teams,    setTeams]    = useState(() => {
    const saved = load("awaygame_teams_v2", null);
    if (saved && saved.length) return saved;
    // migrate old single-team data
    const oldAthletes = load("awaygame_athletes_v1", []);
    const defaultTeam = { id: uid(), name: "My Team" };
    if (oldAthletes.length) {
      const migrated = oldAthletes.map(a => ({...a, teamId: defaultTeam.id}));
      save("awaygame_athletes_v2", migrated);
    }
    return [defaultTeam];
  });
  const [athletes, setAthletes] = useState(() => load("awaygame_athletes_v2", []));
  const [activeTeamId, setActiveTeamId] = useState(() => {
    const saved = load("awaygame_teams_v2", null);
    return saved && saved.length ? saved[0].id : teams[0].id;
  });
 
  const [tab,           setTab]           = useState("athletes");
  const [editing,       setEditing]       = useState(null);
  const [viewing,       setViewing]       = useState(null);
  const [showHelp,      setShowHelp]      = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(null); // { type: "athlete"|"team", data }
  const [teamModal,     setTeamModal]     = useState(null); // null | "new" | teamObj
 
  // persist
  useEffect(() => { save("awaygame_teams_v2", teams); }, [teams]);
  useEffect(() => { save("awaygame_athletes_v2", athletes); }, [athletes]);
 
  const teamAthletes = athletes.filter(a => a.teamId === activeTeamId);
  const teamStats    = calcTeamStats(teamAthletes);
 
  function saveAthlete(p) {
    const updated = { ...p, id: p.id || uid(), lastUpdated: Date.now(), teamId: p.teamId || activeTeamId };
    const next = p.id ? athletes.map(x => x.id === p.id ? updated : x) : [...athletes, updated];
    setAthletes(next);
    setEditing(null);
    // if athlete was moved to another team, switch to that team
    if (updated.teamId !== activeTeamId) setActiveTeamId(updated.teamId);
  }
 
  function deleteAthlete(id) {
    const next = athletes.filter(a => a.id !== id);
    setAthletes(next);
    setConfirmDelete(null);
    if (viewing && viewing.id === id) setViewing(null);
  }
 
  function saveTeam(name) {
    if (teamModal === "new") {
      const newTeam = { id: uid(), name };
      const next = [...teams, newTeam];
      setTeams(next);
      setActiveTeamId(newTeam.id);
    } else {
      setTeams(teams.map(t => t.id === teamModal.id ? { ...t, name } : t));
    }
    setTeamModal(null);
  }
 
  function deleteTeam(team) {
    const next = teams.filter(t => t.id !== team.id);
    const nextAthletes = athletes.filter(a => a.teamId !== team.id);
    setTeams(next);
    setAthletes(nextAthletes);
    if (activeTeamId === team.id) setActiveTeamId(next[0]?.id || null);
    setConfirmDelete(null);
  }
 
  const blankAthlete = { ...BLANK_ATHLETE, teamId: activeTeamId };
 
  return (
    <div style={{minHeight:"100vh",background:C.bg0}}>
      {/* ── HEADER ── */}
      <div style={{background:"#fff",borderBottom:`4px solid ${C.orange}`,padding:"0 16px",height:66,display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 3px 12px rgba(0,0,0,0.08)",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:28,letterSpacing:1.5,color:C.orange,lineHeight:1}}>AWAY GAME</div>
            <div style={{fontSize:11,color:"#777",lineHeight:1}}>Christian Parent's Playbook</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={()=>setShowHelp(true)}
            style={{padding:"8px 12px",borderRadius:10,background:"#fff",border:`2px solid ${C.border}`,fontWeight:700,fontSize:13,color:C.textSub}}>
            ❓<span className="hide-mobile"> Help</span>
          </button>
        </div>
      </div>
 
      {/* ── TAB BAR ── */}
      <div style={{background:"#fff",borderBottom:`1px solid ${C.border}`,padding:"0 16px",display:"flex",alignItems:"center",gap:8,overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
        <div style={{paddingRight:8,borderRight:`1px solid ${C.border}`,marginRight:4,flexShrink:0}}>
          <TeamSwitcher
            teams={teams}
            activeId={activeTeamId}
            onSwitch={setActiveTeamId}
            onNew={()=>setTeamModal("new")}
            onRename={t=>setTeamModal(t)}
            onDelete={t=>setConfirmDelete({type:"team",data:t})}
          />
        </div>
        {["athletes","playbook"].map(t => (
          <button key={t} onClick={()=>setTab(t)}
            style={{padding:"14px 16px",background:"none",border:"none",fontWeight:700,fontSize:13,
              color:tab===t?C.orange:C.textSub,borderBottom:tab===t?`3px solid ${C.orange}`:"3px solid transparent",
              whiteSpace:"nowrap",flexShrink:0}}>
            {t==="athletes"?"👥 Roster":"📖 Playbook"}
          </button>
        ))}
      </div>
 
      {/* ── ATHLETES TAB ── */}
      {tab==="athletes" && (
        <div style={{padding:"16px"}}>
          {/* Team stats bar */}
          {teamAthletes.length > 0 && (
            <div style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:20,boxShadow:"0 4px 15px rgba(0,0,0,0.05)"}}>
              <div style={{fontSize:13,fontWeight:800,color:C.orange,marginBottom:12,textTransform:"uppercase",letterSpacing:1}}>Team Overview</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,textAlign:"center"}}>
                <div>
                  <div style={{fontSize:28,fontWeight:800,color:C.orange}}>{teamStats.avgScore}</div>
                  <div style={{fontSize:11,color:C.textMuted}}>Avg Score</div>
                </div>
                <div>
                  <div style={{fontSize:28,fontWeight:800,color:teamStats.strongPercent>70?C.green:C.orange}}>{teamStats.strongPercent}%</div>
                  <div style={{fontSize:11,color:C.textMuted}}>Strong Virtues</div>
                </div>
                <div>
                  <div style={{fontSize:28,fontWeight:800}}>{teamStats.totalAthletes}</div>
                  <div style={{fontSize:11,color:C.textMuted}}>Athletes</div>
                </div>
              </div>
            </div>
          )}
 
          {/* Actions row */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,gap:8}}>
            <h1 style={{fontSize:22,fontWeight:800}}>Roster</h1>
            <button onClick={()=>setEditing(blankAthlete)}
              style={{background:C.orange,color:"#fff",border:"none",padding:"10px 20px",borderRadius:12,fontWeight:700,fontSize:14,whiteSpace:"nowrap"}}>
              ＋ Add Athlete
            </button>
          </div>
 
          {teamAthletes.length === 0 ? (
            <div style={{textAlign:"center",padding:"80px 20px",color:"#666"}}>
              <div style={{fontSize:64}}>⚽️🏀🏈</div>
              <div style={{fontSize:20,margin:"16px 0",fontWeight:700}}>No athletes yet</div>
              <div style={{fontSize:14,color:C.textMuted,marginBottom:24}}>Add your first player to start tracking character development.</div>
              <button onClick={()=>setEditing(blankAthlete)}
                style={{background:C.orange,color:"#fff",padding:"14px 32px",borderRadius:12,fontSize:16,fontWeight:700,border:"none"}}>
                Add Your First Athlete
              </button>
            </div>
          ) : (
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:14}}>
              {teamAthletes.map(p => {
                const combo = getCombo(p.scores);
                return (
                  <div key={p.id} style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:14,padding:18,boxShadow:"0 4px 16px rgba(0,0,0,0.06)",position:"relative"}}>
                    {/* Delete btn */}
                    <button
                      onClick={e=>{e.stopPropagation();setConfirmDelete({type:"athlete",data:p});}}
                      className="delete-btn"
                      style={{position:"absolute",top:12,right:12}}>
                      🗑
                    </button>
 
                    <div onClick={()=>setViewing(p)} style={{cursor:"pointer",paddingRight:44}}>
                      <div style={{fontSize:20,fontWeight:800,marginBottom:4}}>{p.name}</div>
                      {p.role && <div style={{color:C.textSub,fontSize:13,marginBottom:10}}>{p.role}</div>}
 
                      {/* Virtue chips */}
                      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
                        {Object.entries(p.scores).map(([k,v]) => (
                          <div key={k} style={{background:VIRTUES[k].bg,padding:"4px 8px",borderRadius:6,fontSize:12,fontWeight:600}}>
                            {VIRTUES[k].icon} {v}
                          </div>
                        ))}
                      </div>
 
                      {/* Progress bar */}
                      <div className="progress-bar" style={{marginBottom:8}}>
                        <div className="progress-fill" style={{width:`${combo.progress}%`,background:progressBg(combo.progress)}} />
                      </div>
 
                      {/* Label + date */}
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span style={{fontSize:12,fontWeight:700,color:combo.color}}>{combo.icon} {combo.label}</span>
                        <span style={{fontSize:11,color:C.textMuted}}>{p.lastUpdated?new Date(p.lastUpdated).toLocaleDateString():"Never"}</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
 
      {/* ── PLAYBOOK TAB ── */}
      {tab==="playbook" && (
        <div style={{padding:16,maxWidth:760,margin:"0 auto"}}>
          <div style={{background:"#fff",border:`2px solid ${C.orange}`,borderRadius:14,padding:20,marginBottom:24}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:24,color:C.orange,marginBottom:8}}>THE PLAYBOOK</div>
            <p style={{fontSize:14,color:C.textSub,lineHeight:1.7}}>
              The seven virtues below come from the Fruit of the Spirit (Galatians 5:22–23), applied to competitive youth sports.
              The goal isn't to grade your athletes — it's to help you see them the way God does, and coach them toward who they're becoming.
            </p>
          </div>
          {Object.values(VIRTUES).map(t => (
            <div key={t.key} style={{marginBottom:16,background:"#fff",border:`1px solid ${C.border}`,borderRadius:14,overflow:"hidden"}}>
              <div style={{background:t.bg,padding:"14px 18px",display:"flex",alignItems:"center",gap:14}}>
                <span style={{fontSize:40}}>{t.icon}</span>
                <div>
                  <div style={{fontSize:20,fontWeight:800,color:t.color}}>{t.label}</div>
                  <div style={{color:C.textSub,fontSize:13,fontStyle:"italic"}}>"{t.tagline}"</div>
                </div>
              </div>
              <div style={{padding:"14px 18px"}}>
                <div style={{fontSize:12,color:C.textMuted,marginBottom:10}}>{t.scoreMeaning}</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <div>
                    <div style={{fontSize:12,fontWeight:700,color:C.green,marginBottom:6}}>✓ SHOWING UP</div>
                    {t.strong.map((s,i)=><div key={i} style={{fontSize:13,color:C.textSub,marginBottom:4}}>→ {s}</div>)}
                  </div>
                  <div>
                    <div style={{fontSize:12,fontWeight:700,color:C.red,marginBottom:6}}>✗ GROWING EDGE</div>
                    {t.weak.map((s,i)=><div key={i} style={{fontSize:13,color:C.textSub,marginBottom:4}}>– {s}</div>)}
                  </div>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
 
      {/* ── MODALS ── */}
      {editing && (
        <EditModal person={editing} teams={teams} currentTeamId={activeTeamId} onSave={saveAthlete} onClose={()=>setEditing(null)} />
      )}
 
      {viewing && (
        <PersonDetail
          person={viewing}
          onClose={()=>setViewing(null)}
          onEdit={p=>{ setViewing(null); setEditing(athletes.find(a=>a.id===p.id)||p); }}
          onDelete={()=>setConfirmDelete({type:"athlete",data:viewing})}
        />
      )}
 
      {confirmDelete?.type==="athlete" && (
        <ConfirmModal
          title="Delete Athlete"
          message={<>Are you sure you want to delete <strong>{confirmDelete.data.name}</strong>?</>}
          warning="This cannot be undone."
          confirmLabel="Yes, Delete"
          onConfirm={()=>deleteAthlete(confirmDelete.data.id)}
          onCancel={()=>setConfirmDelete(null)}
        />
      )}
 
      {confirmDelete?.type==="team" && (
        <ConfirmModal
          title="Delete Team"
          message={<>Delete <strong>{confirmDelete.data.name}</strong>?</>}
          warning={`All ${athletes.filter(a=>a.teamId===confirmDelete.data.id).length} athlete(s) on this team will also be permanently deleted. Move any players you want to keep before deleting.`}
          confirmLabel="Delete Team & Athletes"
          onConfirm={()=>deleteTeam(confirmDelete.data)}
          onCancel={()=>setConfirmDelete(null)}
        />
      )}
 
      {teamModal && (
        <TeamNameModal
          team={teamModal === "new" ? null : teamModal}
          onSave={saveTeam}
          onClose={()=>setTeamModal(null)}
        />
      )}
 
      {showHelp && <HelpModal onClose={()=>setShowHelp(false)} />}
    </div>
  );
}
 
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
